{% extends "base.html" %}

{% block title %}Welcome to Arbitrage Finder{% endblock %}

{% block content %}
    <h1>Welcome to Arbitrage Finder</h1>
    <p>This tool scans real-time odds from multiple bookmakers to find arbitrage betting opportunities.</p>

    <form id="sportForm">
        <label for="sport">Choose a sport:</label>
        <select name="sport" id="sport">
            <option value="mma_mixed_martial_arts" {{ 'selected' if sport == 'mma_mixed_martial_arts' else '' }}>MMA</option>
            <option value="tennis" {{ 'selected' if sport == 'tennis' else '' }}>Tennis</option>
            <option value="baseball_mlb" {{ 'selected' if sport == 'baseball_mlb' else '' }}>MLB</option>
            <option value="basketball" {{ 'selected' if sport == 'basketball' else '' }}>NBA</option>
            <option value="soccer" {{ 'selected' if sport == 'soccer' else '' }}>Soccer</option>
            <option value="americanfootball" {{ 'selected' if sport == 'americanfootball' else '' }}>NFL</option>
            <option value="icehockey" {{ 'selected' if sport == 'icehockey' else '' }}>NHL</option>
        </select>
        <button type="button" onclick="setSport()">Update sport</button>
    </form>

    <form id="regionForm">
        <label for="region">Choose bookmaker region:</label>
        <select name="region" id="region">
            <option value="eu" {{ 'selected' if region == 'eu' else '' }}>EU</option>
            <option value="us" {{ 'selected' if region == 'us' else '' }}>US</option>
        </select>
        <button type="button" onclick="setRegion()">Update region</button>
    </form>

    <!-- Final submit button -->
    <button type="button" onclick="findArbitrage()">Find Arbitrage</button>
    
    <div id="resultBox" style="margin-top: 20px;"></div>

    
    <script>
        function setSport() {
            const sport = document.getElementById("sport").value;

            fetch('/set-sport', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ sport: sport })
            })
            .then(response => {
                if (!response.ok) throw new Error("Failed to update sport");
                console.log("Sport updated");
            })
            .catch(error => console.error(error));
        }

        function setRegion() {
            const region = document.getElementById("region").value;

            fetch('/set-region', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ region: region })
            })
            .then(response => {
                if (!response.ok) throw new Error("Failed to update region");
                console.log("Region updated");
            })
            .catch(error => console.error(error));
        }

        function findArbitrage() {
            const sport = document.getElementById("sport").value;
            const region = document.getElementById("region").value;

            fetch(`/get-arbitrage-count?sport=${sport}&region=${region}`)
            .then(response => {
                if (!response.ok) throw new Error("Failed to fetch arbitrage data");
                return response.json();
            })
            .then(data => {
                const box = document.getElementById("resultBox");
                box.innerHTML = `
                    <p><strong>Arbitrage opportunities for ${sport.toUpperCase()} (${region.toUpperCase()} bookmakers):</strong></p>
                    <ul>
                        <li><strong>H2H:</strong> ${data.h2h_count}</li>
                        <li><strong>Totals:</strong> ${data.totals_count}</li>
                        <li><strong>Total:</strong> ${data.total_count}</li>
                    </ul>
                `;
            })
            .catch(error => {
                document.getElementById("resultBox").innerHTML = "<p style='color:red;'>Failed to fetch data.</p>";
                console.error(error);
            });
        }
    </script>

    
{% endblock %}
